name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─── Linux build + tests ───────────────────────────────────────────────────
  build-linux:
    name: "Linux (${{ matrix.preset }})"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        preset: [linux-ci, media-off, audio-off, highway-off]

    steps:
      - uses: actions/checkout@v4

      - name: Verify disabled-test documentation
        run: pwsh -NoLogo -File scripts/check-disabled-tests.ps1

      - name: Install system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            cmake ninja-build build-essential \
            libavcodec-dev libavformat-dev libavutil-dev \
            libswscale-dev libswresample-dev \
            libfreetype6-dev libharfbuzz-dev \
            libomp-dev

      - name: Configure
        run: cmake --preset ${{ matrix.preset }}

      - name: Build
        run: cmake --build --preset ${{ matrix.preset }} -j$(nproc)

      - name: Run Tests
        run: ctest --test-dir build/${{ matrix.preset }} --output-on-failure --label-exclude "render|golden"

      - name: Run Render Tests (linux-ci only)
        if: matrix.preset == 'linux-ci'
        run: ctest --test-dir build/${{ matrix.preset }} --output-on-failure -L render

      - name: Run Golden Tests (linux-ci only)
        if: matrix.preset == 'linux-ci'
        run: ctest --test-dir build/${{ matrix.preset }} --output-on-failure -L golden

  # ─── Windows build + tests ─────────────────────────────────────────────────
  build-windows:
    name: "Windows (windows-ci)"
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Verify disabled-test documentation
        run: pwsh -NoLogo -File scripts/check-disabled-tests.ps1

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Install Ninja
        uses: seanmiddleditch/gha-setup-ninja@v4

      - name: Configure
        run: cmake --preset windows-ci

      - name: Build
        run: cmake --build --preset windows-ci -j4

      - name: Run Tests
        run: ctest --test-dir build/windows-ci --output-on-failure --label-exclude "render|golden"

      - name: Run Render Tests
        run: ctest --test-dir build/windows-ci --output-on-failure -L render

      - name: Run Golden Tests
        run: ctest --test-dir build/windows-ci --output-on-failure -L golden
