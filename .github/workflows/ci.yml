name: Tachyon CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build-debug:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Visual Studio
        uses: microsoft/setup-msbuild@v1

      - name: Configure CMake (Debug)
        run: cmake --preset debug

      - name: Build TachyonCore (Debug)
        run: cmake --build --preset debug --target TachyonCore

      - name: Run Header Smoke Tests
        run: cmake --build --preset debug --target HeaderSmokeTests

  build-relwithdebinfo:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Visual Studio
        uses: microsoft/setup-msbuild@v1

      - name: Configure CMake (RelWithDebInfo)
        run: cmake --preset relwithdebinfo

      - name: Build All (RelWithDebInfo)
        run: cmake --build --preset relwithdebinfo

      - name: Run Tests
        run: .\build.ps1 -RelWithDebInfo -Test

  build-release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Visual Studio
        uses: microsoft/setup-msbuild@v1

      - name: Configure CMake (Release)
        run: cmake --preset release

      - name: Build All (Release)
        run: cmake --build --preset release
