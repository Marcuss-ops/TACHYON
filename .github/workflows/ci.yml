name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─── Linux build + tests ───────────────────────────────────────────────────
  build-linux:
    name: "Linux (GCC Ninja, RelWithDebInfo)"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            cmake ninja-build build-essential \
            libavcodec-dev libavformat-dev libavutil-dev \
            libswscale-dev libswresample-dev \
            libfreetype6-dev libharfbuzz-dev \
            libomp-dev

      - name: Configure
        run: cmake --preset linux-ci

      - name: Build core and tests
        run: cmake --build --preset linux-ci -j$(nproc)

      - name: Run smoke tests
        run: ctest --test-dir build/linux-ci --output-on-failure -R "TachyonSmokeTests"

  # ─── Windows build + tests ─────────────────────────────────────────────────
  build-windows:
    name: "Windows (MSVC Ninja, RelWithDebInfo)"
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Install Ninja
        uses: seanmiddleditch/gha-setup-ninja@v4

      - name: Configure
        run: cmake --preset windows-ci

      - name: Build core and tests
        run: cmake --build --preset windows-ci -j4

      - name: Run smoke tests
        run: ctest --test-dir build/windows-ci --output-on-failure -R "TachyonSmokeTests"
