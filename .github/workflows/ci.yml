name: CI

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  build-and-test:
    name: Build and Test (Windows MSVC)
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Visual Studio
      uses: microsoft/setup-msbuild@v2
      with:
        vs-version: '17.0'

    - name: Install Ninja
      uses: seanmiddleditch/gha-setup-ninja@v4

    - name: Configure CMake
      run: |
        cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=RelWithDebInfo -DTACHYON_TREAT_WARNINGS_AS_ERRORS=ON
      shell: cmd

    - name: Build TachyonCore
      run: cmake --build build --config RelWithDebInfo

    - name: Run Tests
      run: |
        cd build
        tests\TachyonTests.exe --gtest_output=xml:test_results.xml
      shell: cmd

    - name: Upload Test Results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: build/test_results.xml

  build-and-test-ubuntu:
    name: Build and Test (Ubuntu GCC)
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y ninja-build cmake g++-12

    - name: Configure CMake
      run: |
        cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=RelWithDebInfo -DCMAKE_CXX_COMPILER=g++-12 -DTACHYON_TREAT_WARNINGS_AS_ERRORS=ON

    - name: Build TachyonCore
      run: cmake --build build --config RelWithDebInfo

    - name: Run Tests
      run: |
        cd build
        ./tests/TachyonTests --gtest_output=xml:test_results.xml

    - name: Upload Test Results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results-ubuntu
        path: build/test_results.xml
